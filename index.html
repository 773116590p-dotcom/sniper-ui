<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sniper Elite - Multi Profile</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #1a1a2e; color: #fff; padding: 10px; direction: rtl; }
        .card { background: #16213e; padding: 15px; border-radius: 12px; border: 1px solid #0f3460; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        h3 { text-align: center; color: #4ecca3; margin: 5px 0 15px; }
        label { display: block; margin: 8px 0 3px; font-size: 0.8rem; color: #aaa; }
        input, select { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #1b262c; background: #1a1a2e; color: #fff; box-sizing: border-box; font-size: 0.9rem; }
        .row { display: flex; gap: 8px; }
        .row div { flex: 1; }
        .section-title { color: #fca311; font-weight: bold; font-size: 0.85rem; margin-top: 15px; border-bottom: 1px dashed #333; padding-bottom: 3px; }
        button { width: 100%; padding: 15px; margin-top: 20px; border: none; border-radius: 10px; background: #4ecca3; color: #1a1a2e; font-weight: bold; cursor: pointer; font-size: 1rem; transition: 0.3s; }
        button:active { transform: scale(0.98); background: #45b791; }

        /* ستايل شاشة الاختيار */
        #selection-screen { display: flex; flex-direction: column; gap: 20px; justify-content: center; height: 80vh; }
        .profile-btn { height: 100px; font-size: 2rem; background: #0f3460; color: #4ecca3; border: 2px solid #4ecca3; }
        #main-content { display: none; }
        .back-btn { background: #333; padding: 5px 15px; margin-bottom: 10px; font-size: 0.8rem; width: auto; display: inline-block; }
    </style>
</head>
<body>

    <!-- شاشة اختيار رقم الصفحة -->
    <div id="selection-screen">
        <h3>اختر لوحة التحكم</h3>
        <button class="profile-btn" onclick="openProfile('1')">1</button>
        <button class="profile-btn" onclick="openProfile('2')">2</button>
    </div>

    <!-- كود الصفحة الأصلي (مخفي في البداية) -->
    <div id="main-content">
        <button class="back-btn" onclick="goBack()">⬅️ رجوع للخلف</button>
        <div class="card">
            <h3 id="profile-title">⚔️ لوحة تحكم القنص</h3>
            
            <label>نوع الهجوم الأساسي:</label>
            <select id="side">
                <option value="buy">شراء (BUY 🟢) -> الطعم بيع</option>
                <option value="sell">بيع (SELL 🔴) -> الطعم شراء</option>
            </select>

            <div class="section-title">🎯 الهجوم الكبير (الهدف)</div>
            <div class="row">
                <div><label>سعر الدخول:</label><input type="number" id="p_real" step="0.00000001" placeholder="2.118"></div>
                <div><label>الكمية:</label><input type="number" id="amt" placeholder="4900"></div>
            </div>

            <div class="section-title">🎣 الطعم المعاكس (Bait)</div>
            <div class="row">
                <div><label>سعر الطعم:</label><input type="number" id="p_bait" step="0.00000001" placeholder="2.1175"></div>
                <div><label>كمية الطعم:</label><input type="number" id="amt_bait" placeholder="1"></div>
            </div>
            <div class="row">
                <div><label>الطعم قبل الهجوم بـ (ث):</label><input type="number" id="t_bait_start" value="3"></div>
                <div><label>مدة الهجوم (ث):</label><input type="number" id="cycle_duration" value="55"></div>
            </div>

            <div class="section-title">⏱️ توقيت النبضة</div>
            <div class="row">
                <div><label>وقت الانتظار (Wait Pulse):</label><input type="number" id="wait_pulse" placeholder="240"></div>
                <div><label>خصم الملي ثانية:</label><input type="number" id="offset_ms" value="100"></div>
            </div>
            
            <div class="row">
                <div><label>وقت الإغلاق (إلغاء):</label><input type="number" id="w_t" step="0.01" value="0.2"></div>
                <div><label>وقت التكرار (الراحة):</label><input type="number" id="l_t" step="1" value="1.05"></div>
            </div>

            <button onclick="save()">🚀 تفعيل النظام المتكامل</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        let currentProfile = '';
        const fields = ['side', 'p_real', 'amt', 'p_bait', 'amt_bait', 't_bait_start', 'cycle_duration', 'wait_pulse', 'offset_ms', 'w_t', 'l_t'];

        function openProfile(num) {
            currentProfile = num;
            document.getElementById('selection-screen').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            document.getElementById('profile-title').innerText = `⚔️ لوحة التحكم (${num})`;
            
            // تحميل البيانات الخاصة بالرقم المختار فقط
            fields.forEach(f => {
                const val = localStorage.getItem(currentProfile + '_' + f);
                const el = document.getElementById(f);
                if(el) el.value = val ? val : getDefaultValue(f);
            });
        }

        function goBack() {
            document.getElementById('selection-screen').style.display = 'flex';
            document.getElementById('main-content').style.display = 'none';
        }

        function getDefaultValue(id) {
            // القيم الافتراضية الأصلية في حال لم يوجد تخزين سابق
            const defaults = {
                't_bait_start': '3',
                'cycle_duration': '55',
                'offset_ms': '100',
                'w_t': '0.2',
                'l_t': '1.05'
            };
            return defaults[id] || '';
        }

        function save() {
            const data = {};
            fields.forEach(f => {
                const el = document.getElementById(f);
                if(el) {
                    data[f] = el.value;
                    // الحفظ في التخزين المحلي مع سابقة (1_ أو 2_) لضمان الانفصال
                    localStorage.setItem(currentProfile + '_' + f, el.value);
                }
            });
            
            // إرسال البيانات للبوت (ستصل بنفس الأسماء الأصلية تماماً)
            tg.sendData(JSON.stringify(data));
            tg.close();
        }
    </script>
</body>
</html>
