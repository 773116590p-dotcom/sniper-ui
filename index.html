<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sniper Control Panel</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 400px;
            background: #1e1e1e;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            border: 1px solid #333;
        }
        h2 {
            text-align: center;
            color: #4ecca3;
            margin-bottom: 20px;
            font-size: 1.2rem;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.85rem;
            color: #999;
        }
        input, select {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 8px;
            border: 1px solid #333;
            background: #252525;
            color: white;
            font-size: 1rem;
            box-sizing: border-box;
        }
        input:focus {
            outline: none;
            border-color: #4ecca3;
        }
        .row {
            display: flex;
            gap: 10px;
        }
        .row div {
            flex: 1;
        }
        button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            background: #4ecca3;
            color: #1a1a2e;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
        }
        button:hover {
            background: #45b791;
        }
        .footer {
            text-align: center;
            font-size: 0.7rem;
            color: #555;
            margin-top: 15px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>⚙️ إعدادات القنص المتقدمة</h2>

    <label>نوع العملية:</label>
    <select id="side">
        <option value="buy">شراء (BUY 🟢)</option>
        <option value="sell">بيع (SELL 🔴)</option>
    </select>

    <div class="row">
        <div>
            <label>أقل سعر (Min):</label>
            <input type="number" id="p_min" step="0.0001" value="1.7010">
        </div>
        <div>
            <label>أعلى سعر (Max):</label>
            <input type="number" id="p_max" step="0.0001" value="1.7060">
        </div>
    </div>

    <label>الكمية (Amount):</label>
    <input type="number" id="amt" value="4900">

    <label>وقت النبضة (Wait Pulse):</label>
    <input type="number" id="wait_pulse" value="230">

    <div class="row">
        <div>
            <label>وقت الإغلاق (Win):</label>
            <input type="number" id="w_t" step="0.01" value="0.55">
        </div>
        <div>
            <label>وقت التكرار (Loss):</label>
            <input type="number" id="l_t" step="0.01" value="1.1">
        </div>
    </div>

    <button onclick="sendData()">🚀 تفعيل الهجوم</button>
    <div class="footer">سيتم تحديث الإعدادات وإرسال الإشعار فوراً</div>
</div>

<script>
    const tg = window.Telegram.WebApp;
