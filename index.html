<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sniper Elite Control</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #1a1a2e; color: #fff; padding: 15px; direction: rtl; }
        .card { background: #16213e; padding: 20px; border-radius: 12px; border: 1px solid #0f3460; }
        label { display: block; margin: 10px 0 5px; font-size: 0.85rem; color: #aaa; }
        input, select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #1b262c; background: #1a1a2e; color: #fff; box-sizing: border-box; margin-bottom: 10px; }
        .row { display: flex; gap: 10px; }
        .row div { flex: 1; }
        button { width: 100%; padding: 15px; margin-top: 15px; border: none; border-radius: 8px; background: #4ecca3; color: #1a1a2e; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h2 style="text-align:center; color:#4ecca3; margin-top:0;">⚔️ إعدادات القنص</h2>
        <label>نوع العملية:</label>
        <select id="side"><option value="buy">شراء (BUY 🟢)</option><option value="sell">بيع (SELL 🔴)</option></select>
        <div class="row">
            <div><label>أقل سعر (Min):</label><input type="number" id="p_min" step="0.0001"></div>
            <div><label>أعلى سعر (Max):</label><input type="number" id="p_max" step="0.0001"></div>
        </div>
        <label>الكمية (Amount):</label><input type="number" id="amt">
        <label>وقت النبضة (Wait Pulse):</label><input type="number" id="wait_pulse">
        <div class="row">
            <div><label>وقت الإغلاق:</label><input type="number" id="w_t" step="0.01"></div>
            <div><label>وقت التكرار:</label><input type="number" id="l_t" step="0.01"></div>
        </div>
        <button onclick="save()">🚀 تفعيل الهجوم</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // وظيفة لتحميل البيانات المحفوظة عند فتح الصفحة
        window.onload = function() {
            const fields = ['side', 'p_min', 'p_max', 'amt', 'wait_pulse', 'w_t', 'l_t'];
            fields.forEach(f => {
                const val = localStorage.getItem(f);
                if (val) document.getElementById(f).value = val;
            });
        };

        function save() {
            const data = {
                side: document.getElementById('side').value,
                p_min: document.getElementById('p_min').value,
                p_max: document.getElementById('p_max').value,
                amt: document.getElementById('amt').value,
                wait_pulse: document.getElementById('wait_pulse').value,
                w_t: document.getElementById('w_t').value,
                l_t: document.getElementById('l_t').value
            };
            // حفظ في المتصفح للمرة القادمة
            for (let key in data) { localStorage.setItem(key, data[key]); }
            
            tg.sendData(JSON.stringify(data));
            tg.close();
        }
    </script>
</body>
</html>
