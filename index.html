<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sniper Control Panel</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 400px;
            background: #1e1e1e;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        h2 {
            text-align: center;
            color: #00e676;
            margin-bottom: 20px;
            font-size: 1.2rem;
        }
        .input-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.9rem;
            color: #b0b0b0;
        }
        input, select {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #333;
            background: #252525;
            color: white;
            font-size: 1rem;
            box-sizing: border-box;
        }
        input:focus {
            outline: none;
            border-color: #00e676;
        }
        .row {
            display: flex;
            gap: 10px;
        }
        .row .input-group {
            flex: 1;
        }
        button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            background: #00e676;
            color: #000;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.3s;
        }
        button:hover {
            background: #00c853;
        }
        .footer {
            text-align: center;
            font-size: 0.7rem;
            color: #666;
            margin-top: 15px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>⚙️ لوحة تحكم القناص</h2>

    <div class="input-group">
        <label>نوع العملية:</label>
        <select id="side">
            <option value="buy">شراء (BUY 🟢)</option>
            <option value="sell">بيع (SELL 🔴)</option>
        </select>
    </div>

    <div class="row">
        <div class="input-group">
            <label>أقل سعر (Min):</label>
            <input type="number" id="p_min" step="0.0001" value="1.7010">
        </div>
        <div class="input-group">
            <label>أعلى سعر (Max):</label>
            <input type="number" id="p_max" step="0.0001" value="1.7060">
        </div>
    </div>

    <div class="input-group">
        <label>الكمية (Amount):</label>
        <input type="number" id="amt" value="4900">
    </div>

    <div class="input-group">
        <label>وقت النبضة (Wait Pulse):</label>
        <input type="number" id="wait_pulse" value="230">
    </div>

    <div class="row">
        <div class="input-group">
            <label>وقت الإغلاق (Win):</label>
            <input type="number" id="w_t" step="0.01" value="0.55">
        </div>
        <div class="input-group">
            <label>وقت التكرار (Loss):</label>
            <input type="number" id="l_t" step="0.01" value="1.1">
        </div>
    </div>

    <button onclick="sendData()">🚀 تفعيل الهجوم العشوائي</button>
    <div class="footer">سيتم إرسال الإعدادات فوراً إلى البوت</div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand(); // تمديد الواجهة لتملأ الشاشة

    function sendData() {
        const data = {
            side: document.getElementById('side').value,
            p_min: document.getElementById('p_min').value,
            p_max: document.getElementById('p_max').value,
            amt: document.getElementById('amt').value,
            wait_pulse: document.getElementById('wait_pulse').value,
            w_t: document.getElementById('w_t').value,
            l_t: document.getElementById('l_t').value
        };

        // إرسال البيانات إلى البوت وإغلاق الواجهة
        tg.sendData(JSON.stringify(data));
        tg.close();
    }
</script>

</body>
</html>
